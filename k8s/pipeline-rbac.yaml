apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline
  namespace: cicd
secrets:
  - name: harbor-auth
  - name: gitlab-auth
imagePullSecrets:
  - name: harbor-auth
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pipeline-edit-binding
subjects:
  - kind: ServiceAccount
    name: pipeline
    namespace: cicd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
