apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tekton-demo-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://10.0.0.200/root/teketondemo.git
    targetRevision: main
    path: gitops/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: tekton-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
