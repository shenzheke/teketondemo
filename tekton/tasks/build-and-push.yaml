apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-and-push
  namespace: cicd
spec:
  params:
    - name: image
      type: string
    - name: context
      type: string
      default: .
  workspaces:
    - name: source
  steps:
    - name: build
      image: gcr.io/kaniko-project/executor:v1.23.2
      workingDir: $(workspaces.source.path)/source
      env:
        - name: DOCKER_CONFIG
          value: /kaniko/.docker
      args:
        - --dockerfile=Dockerfile
        - --context=$(workspaces.source.path)/source/$(params.context)
        - --destination=$(params.image)
        - --insecure
        - --skip-tls-verify
        - --insecure-pull
      volumeMounts:
        - name: docker-config
          mountPath: /kaniko/.docker
  volumes:
    - name: docker-config
      secret:
        secretName: harbor-auth
        items:
          - key: .dockerconfigjson
            path: config.json
